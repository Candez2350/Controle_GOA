<!-- ABA 4: NOTAS FISCAIS -->
<div id="tab-notas" class="tab-pane">
    <div class="actions-bar">
        <div class="filters">
            <input type="text" id="filter-nf-num" placeholder="Buscar por número NF...">
        </div>
        <div class="buttons">
            <button class="btn btn-primary btn-with-icon" id="btn-modal-nf">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Lançar Nota Fiscal
            </button>
        </div>
    </div>

    <div class="panel-box">
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Número NF</th>
                        <th>Contrato / Adesão</th>
                        <th>Data Emissão</th>
                        <th>Vencimento</th>
                        <th>Valor da NF</th>
                        <th>Fonte</th>
                        <th>Processo SEI DGAF</th>
                        <th>Situação</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="table-notas-fiscais">
                    <!-- Carregado via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>
